# ============================================================
# Tiny Dino AI Shorts Factory - Configuration v2.0.2
# ============================================================

project_root: "/workspace/dino"

# ------------------------------------------------------------
# Video Settings (9:16 Vertical for Shorts/Reels/TikTok)
# ------------------------------------------------------------
video:
  width: 720
  height: 1280
  fps: 30
  scene_duration: 5        # seconds per scene
  outro_duration: 4        # seconds for outro
  total_scenes: 6          # typical story arc scenes
  output_format: "mp4"
  codec: "libx264"
  crf: 23                  # quality (lower = better, 18-28 range)
  preset: "medium"         # encoding speed preset

# ------------------------------------------------------------
# Generation Settings
# ------------------------------------------------------------
generation:
  videos_per_run: 1
  max_retry: 3
  save_after_each_video: true
  parallel_scenes: 1       # RTX 3090 24GB safe default
  temp_cleanup: true       # clean temp files after successful assembly

# ------------------------------------------------------------
# Quality Thresholds
# ------------------------------------------------------------
quality:
  min_story_score: 70      # reject stories below this
  min_scene_score: 65
  max_regenerations: 3     # max retries for a single story
  require_strong_hook: true
  require_visual_clarity: true

# ------------------------------------------------------------
# Budget Control (INR)
# ------------------------------------------------------------
budget:
  monthly_budget_inr: 1000
  stop_when_exceeded: true
  cost_per_video_estimate_inr: 15
  warning_threshold_percent: 80
  track_gpu_minutes: true

# ------------------------------------------------------------
# Upload Configuration
# ------------------------------------------------------------
upload:
  enabled: true
  videos_per_day: 1
  upload_times:
    - "18:00"
  platforms:
    - youtube
    # - instagram  # future
    # - tiktok     # future
  title_template: "Tiny Dino {episode} - {story_title}"
  description_template: |
    Tiny Dino Adventures - Episode {episode}
    
    {story_summary}
    
    #tinydino #dinosaur #animation #cartoon #shorts #ai
  tags:
    - tiny dino
    - dinosaur cartoon
    - ai animation
    - kids entertainment
    - funny dinosaur
    - shorts

# ------------------------------------------------------------
# Story Anti-Repetition
# ------------------------------------------------------------
story:
  anti_repeat: true
  history_limit: 1000
  similarity_threshold: 0.75
  history_file: "data/story_history.json"

# ------------------------------------------------------------
# Model Configuration (Local Deployment)
# ------------------------------------------------------------
models:
  # LLM via Ollama — Qwen3 32B
  llm:
    provider: "ollama"
    model: "qwen3:32b"              # upgraded from qwen3:14b for richer stories
    base_url: "http://localhost:11434"
    temperature: 0.8
    max_tokens: 2048
    timeout: 300                     # increased for 32B model

  # Image Generation — FLUX.1 Dev
  # ─────────────────────────────────────────────────────────
  # black-forest-labs/FLUX.1-schnell  ← ACTIVE (faster, lower VRAM, 4 steps)
  #   ~12GB VRAM with CPU offload, 4 inference steps
  #   guidance_scale 0.0 optimal
  #
  # Alternatives (swap model: below, leave other keys as-is):
  #   black-forest-labs/FLUX.1-dev      — better quality but needs 20+ steps and more VRAM
  #   stabilityai/sdxl-turbo            — no auth, fast 4-step
  #   stabilityai/stable-diffusion-xl-base-1.0  — open, no auth
  # ─────────────────────────────────────────────────────────
  image:
    provider: "diffusers"
    model: "black-forest-labs/FLUX.1-schnell"
    dtype: "bfloat16"
    enable_cpu_offload: true
    guidance_scale: 0.0              # FLUX.1 Schnell optimal: 0.0
    num_inference_steps: 4           # 4 steps for Schnell
    max_sequence_length: 256
    ip_adapter_scale: 0.6
    hf_token: ""                     # REQUIRED — set your HuggingFace token
                                     # or run: huggingface-cli login

  # Video Generation — Wan 2.1 I2V (Image-to-Video)
  # ─────────────────────────────────────────────────────────
  # Wan-AI/Wan2.1-I2V-14B-480P-Diffusers  ← ACTIVE
  #   ~18GB VRAM with CPU offload, 30 inference steps
  #   Native resolution: 480×832 portrait, upscaled to 720×1280 by FFmpeg
  #
  # Alternatives:
  #   Wan-AI/Wan2.2-I2V-Diffusers     — newer, better motion, more VRAM (~20+ GB)
  # ─────────────────────────────────────────────────────────
  video:
    provider: "wan"                  # changed from "ltx"
    model: "Wan-AI/Wan2.1-I2V-14B-480P-Diffusers"
    dtype: "bfloat16"
    enable_vae_slicing: true
    num_inference_steps: 30
    guidance_scale: 5.0
    target_fps: 16                   # Wan native fps
    max_area_width: 480              # Wan-native portrait width
    max_area_height: 832             # Wan-native portrait height

  # Audio Generation - Stable Audio Open
  audio:
    provider: "stable_audio"
    model: "stabilityai/stable-audio-open-1.0"
    dtype: "bfloat16"
    audio_length: 8.0       # seconds
    num_inference_steps: 20
    cfg_scale: 7.0
    hf_token: ""             # gated model — accept license at huggingface.co first
                              # or run: huggingface-cli login

# ------------------------------------------------------------
# Asset Management
# ------------------------------------------------------------
assets:
  outro_video: "assets/outro.mp4"
  outro_metadata: "assets/outro.json"
  outro_ref: "assets/outro_ref.png"
  logo: "assets/logo.png"
  font: "assets/fonts/ComicSansMS.ttf"
  watermark: "assets/watermark.png"
  character_ref: "assets/dinocharacter.png"

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging:
  level: "INFO"
  file: "logs/factory.log"
  max_size_mb: 50
  backup_count: 5
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
